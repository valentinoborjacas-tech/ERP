<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGA-Almacén</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/3.4.1/tailwind.min.js"></script>
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="p-3">

<div class="max-w-[1180px] mx-auto bevel-out" style="border-radius:4px; overflow:hidden;">

  <!-- Cabecera -->
  <div class="app-header flex items-center justify-between">
    <div class="flex items-center gap-2">
      <button class="header-btn hamburger-btn" id="hamburger-btn" title="Menú de módulos">☰</button>
      <div>
        <div class="app-name">📦 SGA-Almacén</div>
        <div class="breadcrumb">Almacén &nbsp;›&nbsp; <b id="crumb-module">Stock</b></div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button class="header-btn"><span class="btn-text-full">🔍 Buscar Global</span><span class="btn-text-short">🔍</span></button>
      <button class="header-btn primary"><span class="btn-text-full">💾 Guardar</span><span class="btn-text-short">💾</span></button>
    </div>
  </div>

  <!-- Cuerpo: Sidebar + Contenido -->
  <div class="app-body">

    <!-- Fondo oscuro al abrir el sidebar en móvil -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-title">Módulos</div>
      <div class="nav-item active" data-module="stock" title="Stock">
        <span class="nav-icon">📊</span><span class="nav-label">Stock</span>
      </div>
      <div class="nav-item" data-module="articulos" title="Artículos / Catálogo">
        <span class="nav-icon">📋</span><span class="nav-label">Artículos / Catálogo</span>
      </div>
      <div class="nav-item" data-module="ubicaciones" title="Ubicaciones">
        <span class="nav-icon">📍</span><span class="nav-label">Ubicaciones</span>
      </div>
      <div class="nav-item" data-module="historial" title="Historial">
        <span class="nav-icon">🕘</span><span class="nav-label">Historial</span>
      </div>
    </div>

    <!-- CONTENIDO: cada módulo se inyecta aquí desde su propio archivo -->
    <div class="main-content" id="main-content">
      <div class="module-title">Cargando…</div>
    </div>

  </div>

  <!-- Barra de estado -->
  <div class="status-bar flex text-[11.5px]">
    <div class="status-cell flex-1" id="status-message">Listo</div>
    <div class="status-cell w-36">Usuario: admin</div>
  </div>

</div>

<!-- Orden importa: config primero, luego los módulos (definen sus funciones),
     y app.js al final (que arranca cargando el módulo inicial) -->
<script src="assets/config.js"></script>
<script src="modules/stock.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
